name: Create Release 0.01

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'copilot/add-upward-arrow-icon'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Create GitHub Release 0.01
        uses: softprops/action-gh-release@v2
        with:
          tag_name: '0.01'
          name: 'v0.01'
          body: |
            ## AccelMeter v0.01 首个发布版本

            ### 新功能
            - ⬆️ 向上箭头应用图标（蓝色背景+白色箭头）
            - 三轴加速度（X/Y/Z）移动平均滤波显示
            - 适用于日常驾驶测量简易加速度
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
